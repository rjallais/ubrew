[tools]
odin = "dev-2026-06"

[env]
UBREW_TELEMETRY = "0" # Disable telemetry in development environments

[tasks.build-libsqlite]
description = "One-time build of libsqlite3-fts5 from the amalgamation (only needed when sqlite3.c changes)"
run = """
case "$(uname -s)" in
  Darwin) ext=dylib ;;
  *)      ext=so    ;;
esac
cc -c -O2 -fPIC -DSQLITE_ENABLE_FTS5 src/api/sqlite3.c -o src/api/sqlite3-fts5.o &&
cc -shared src/api/sqlite3-fts5.o -o "src/vendor/odin-sqlite3/libsqlite3-fts5.${ext}" &&
if [ "$(uname -s)" = "Darwin" ]; then
  strip -x "src/vendor/odin-sqlite3/libsqlite3-fts5.${ext}"
else
  strip "src/vendor/odin-sqlite3/libsqlite3-fts5.${ext}"
fi
"""
sources = ["src/api/sqlite3.c"]
outputs = ["src/vendor/odin-sqlite3/libsqlite3-fts5.so", "src/vendor/odin-sqlite3/libsqlite3-fts5.dylib"]

[tasks.build]
description = "Build ubrew with aggressive optimizations for the native CPU (fastest dev build, no LTO)"
run = '''
case "$(uname -s)" in
  Darwin) ext=dylib ;;
  *)      ext=so    ;;
esac
odin build src -out:ubrew -define:SQLITE3_CUSTOM_FTS5=true -o:aggressive -no-bounds-check -no-type-assert -disable-assert -microarch:native
cp "src/vendor/odin-sqlite3/libsqlite3-fts5.${ext}" .
'''
depends = ["build-libsqlite"]
sources = ["src/**/*.odin"]
outputs = ["ubrew"]

[tasks.build-portable]
description = "Build ubrew without CPU-specific optimizations (more portable binary)"
run = "odin build src -out:ubrew_portable -define:SQLITE3_CUSTOM_FTS5=true -o:speed -no-bounds-check"
depends = ["build-libsqlite"]
sources = ["src/**/*.odin"]
outputs = ["ubrew_portable"]

[tasks.build-prod]
description = "Build ubrew for production: aggressive opts + LTO + release linker (requires lld+lto:thin; slowest build, fastest binary)"
run = "odin build src -out:ubrew_prod -define:SQLITE3_CUSTOM_FTS5=true -o:aggressive -no-bounds-check -no-type-assert -disable-assert -microarch:native -linker:lld -lto:thin -reloc-mode:pic -use-single-module"
depends = ["build-libsqlite"]
sources = ["src/**/*.odin"]
outputs = ["ubrew_prod"]

[tasks.run]
description = "Run ubrew with arguments"
run = "./ubrew"
depends = ["build"]

[tasks.test]
description = "Run integration smoke tests"
run = "./tests/smoke-test.sh ./ubrew"
depends = ["build"]

[tasks.test-unit]
description = "Run Odin unit tests"
run = "odin test src src/tap src/api -define:SQLITE3_CUSTOM_FTS5=true"
depends = ["build-libsqlite"]

[tasks.bench-install]
description = "Benchmark installs vs nb/brew (if present)"
run = "./bench/bench_pkgmgr.sh install tree"
depends = ["build"]

[tasks.bench-update]
description = "Benchmark update vs nb/brew (if present)"
run = "./bench/bench_pkgmgr.sh update"
depends = ["build"]

[tasks.bench-upgrade]
description = "Benchmark upgrade vs nb/brew (if present)"
run = "./bench/bench_pkgmgr.sh upgrade"
depends = ["build"]

[tasks.bench-all]
description = "Run the full benchmark suite (install + update + upgrade)"
run = "mise run bench-install && mise run bench-update && mise run bench-upgrade"
depends = ["build"]

[tasks.clean]
description = "Clean up compiler build artifacts"
run = "rm -f ubrew ubrew_portable ubrew_prod ubrew_dbg libsqlite3-fts5.so libsqlite3-fts5.dylib src/api/sqlite3-fts5.o src/api/sqlite3.o"

[tasks.check]
description = "Type check all Odin source files"
run = "odin check src -define:SQLITE3_CUSTOM_FTS5=true"
depends = ["build-libsqlite"]

[tasks.profile-build]
description = "Show compile-time stage timings for the current build configuration"
run = "odin build src -out:ubrew -define:SQLITE3_CUSTOM_FTS5=true -o:aggressive -no-bounds-check -no-type-assert -disable-assert -microarch:native -show-timings"
