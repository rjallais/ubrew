name: Update Homebrew Formula on Release

# Fires after a maintainer publishes a GitHub Release with the locally
# notarized macOS tarballs uploaded as assets. The release.yml workflow
# itself stays disabled because Apple notarization runs from a developer
# machine via scripts/notarize-macos.sh — see release.yml.disabled.
#
# This job downloads the two macOS tarballs from the published release,
# recomputes their SHA256s, rewrites Formula/nanobrew.rb, runs the formula
# verifier, and opens a PR against main with the bump.
#
# Skipped automatically for prereleases (tags containing a hyphen, e.g.
# v0.1.193-rc1).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to bump the formula to (e.g. v0.1.193)"
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update-formula:
    if: ${{ github.event_name == 'workflow_dispatch' || !contains(github.event.release.tag_name, '-') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Resolve release tag
        id: tag
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            TAG="$INPUT_TAG"
          else
            TAG="$RELEASE_TAG"
          fi
          if [[ -z "$TAG" ]]; then
            echo "no release tag resolved" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release tarballs
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          mkdir -p artifacts
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern 'nb-arm64-apple-darwin.tar.gz' \
            --pattern 'nb-x86_64-apple-darwin.tar.gz' \
            --dir artifacts
          ls -la artifacts/

      - name: Rewrite Formula/nanobrew.rb
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          ARM64_SHA=$(sha256sum artifacts/nb-arm64-apple-darwin.tar.gz | cut -d' ' -f1)
          X86_SHA=$(sha256sum artifacts/nb-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)

          cat > Formula/nanobrew.rb <<FORMULA
          class Nanobrew < Formula
            desc "The fastest macOS package manager. Written in Zig."
            homepage "https://github.com/justrach/nanobrew"
            license "Apache-2.0"
            version "${VERSION}"
            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/justrach/nanobrew/releases/download/v${VERSION}/nb-arm64-apple-darwin.tar.gz"
                sha256 "${ARM64_SHA}"
              else
                url "https://github.com/justrach/nanobrew/releases/download/v${VERSION}/nb-x86_64-apple-darwin.tar.gz"
                sha256 "${X86_SHA}"
              end
            end


            def install
              bin.install "nb"
            end

            def post_install
              ohai "Run 'nb init' to create the nanobrew directory tree"
            end

            test do
              assert_match "nanobrew", shell_output("#{bin}/nb help")
            end
          end
          FORMULA

          sed -i 's/^          //' Formula/nanobrew.rb
          cat Formula/nanobrew.rb

      - name: Verify formula against published release
        run: bash scripts/verify-formula-release.sh Formula/nanobrew.rb

      - name: Open formula PR
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          BRANCH="release/formula-${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Formula/nanobrew.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date for ${TAG}"
            exit 0
          fi

          git checkout -b "$BRANCH"
          git commit -m "formula: update to ${TAG}"
          git push -f origin "$BRANCH"

          existing_pr="$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number // empty')"
          if [ -n "$existing_pr" ]; then
            echo "PR #$existing_pr already exists"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "formula: update to ${TAG}" \
            --body "Automated bump of \`Formula/nanobrew.rb\` after the GitHub Release for \`${TAG}\` was published with notarized macOS tarballs.

          Verified by \`scripts/verify-formula-release.sh\`. Closes #274 once merged.

          Maintainers: do not bump the formula to a version without a matching release (see docs/RELEASING.md)."
