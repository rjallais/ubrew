name: CI

on:
  push:
    branches: [main, ubrew]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4

      - name: Compile SQLite3
        run: cc -c -O2 src/api/sqlite3.c -o src/api/sqlite3.o

      - name: Build ubrew
        run: odin build src -out:ubrew -o:speed

      - name: Verify binary
        run: |
          chmod +x ubrew
          file ubrew
          ls -lh ubrew

      - name: Pre-test Setup
        run: |
          sudo mkdir -p /opt/ubrew
          sudo chown -R $USER /opt/ubrew
          ./ubrew tap trust ublue-os/tap || exit 1
          ./ubrew tap trust justrach/nanobrew || exit 1
          echo "/opt/ubrew/prefix/bin" >> $GITHUB_PATH

      - name: Run unit tests
        run: odin test src

      - name: Run smoke tests
        run: bash tests/smoke-test.sh ./ubrew
