name: CI

on:
  push:
    branches: [main, ubrew, feat/clean-downloads]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Build ubrew
        run: mise run build

      - name: Verify binary
        run: |
          chmod +x ubrew
          file ubrew
          ls -lh ubrew

      - name: Run smoke tests
        run: bash tests/smoke-test.sh ./ubrew
