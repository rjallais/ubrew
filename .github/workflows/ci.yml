name: CI

on:
  push:
    branches: [main, ubrew, feat/clean-downloads]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Build ubrew
        run: odin build src -out:ubrew -debug

      - name: Verify binary
        run: |
          chmod +x ubrew
          file ubrew
          ls -lh ubrew

      - name: Pre-test Setup
        run: |
          sudo mkdir -p /opt/ubrew
          sudo chown -R $USER /opt/ubrew
          sudo mkdir -p /opt
          sudo ln (if [ "$RUNNER_OS" = "macOS" ]; then echo "-sfn"; else echo "-sfn"; fi) /opt/ubrew /opt/nanobrew
          if command -v lldb >/dev/null 2>&1; then
            lldb --batch -o "run" -o "bt" -- ./ubrew tap trust ublue-os/tap
          else
            ./ubrew tap trust ublue-os/tap
          fi
          ./ubrew tap trust justrach/nanobrew
          echo "/opt/ubrew/prefix/bin" >> $GITHUB_PATH
          echo "/opt/nanobrew/prefix/bin" >> $GITHUB_PATH

      - name: Run smoke tests
        run: bash tests/smoke-test.sh ./ubrew
